name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Project is managed with Bun (bun.lock is the committed lockfile,
      # there is no package-lock.json/yarn.lock/pnpm-lock.yaml).
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: npm run test

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build
